<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Internet — Samikaran Olympiad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 1.5rem;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
    }
    .bg-glow-1 { width: 400px; height: 400px; top: -100px; left: -100px; background: #9333EA; }
    .bg-glow-2 { width: 350px; height: 350px; bottom: -80px; right: -80px; background: #EC4899; }

    .container {
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      margin: 0 auto 2rem;
      animation: float 3s ease-in-out infinite;
    }
    .logo-svg {
      width: 80px;
      height: 80px;
      margin: 0 auto;
      opacity: 0.7;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .wifi-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      position: relative;
    }
    .wifi-icon svg {
      width: 100%;
      height: 100%;
    }
    .wifi-slash {
      animation: pulse-opacity 2s ease-in-out infinite;
    }
    @keyframes pulse-opacity {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }
    .brand-dot {
      background: linear-gradient(135deg, #9333EA, #EC4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-sub {
      font-size: 0.75rem;
      color: #a855f7;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #e2e8f0, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .tips {
      text-align: left;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
    }
    .tips-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #a855f7;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.75rem;
    }
    .tip {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
      color: #cbd5e1;
      font-size: 0.9rem;
    }
    .tip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, #9333EA, #EC4899);
      flex-shrink: 0;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #9333EA, #C026D3, #EC4899);
      color: white;
      border: none;
      padding: 0.875rem 2.5rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(147, 51, 234, 0.35);
      letter-spacing: 0.5px;
    }
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(147, 51, 234, 0.5);
    }
    .retry-btn:active {
      transform: scale(0.97);
    }
    .retry-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.3s;
    }
    .retry-btn:hover svg {
      transform: rotate(180deg);
    }

    .status-bar {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #64748b;
      font-size: 0.8rem;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.4rem; }
      .wifi-icon { width: 90px; height: 90px; }
      .tips { padding: 1rem 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="container">
    <div class="logo-wrap">
      <svg class="logo-svg" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gUp" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#9333EA"/>
            <stop offset="50%" style="stop-color:#C026D3"/>
            <stop offset="100%" style="stop-color:#EC4899"/>
          </linearGradient>
          <linearGradient id="gDn" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#A855F7"/>
            <stop offset="100%" style="stop-color:#F472B6"/>
          </linearGradient>
        </defs>
        <polygon points="36,7 64,54 8,54" fill="url(#gUp)"/>
        <polygon points="36,65 8,18 64,18" fill="url(#gDn)" opacity="0.88"/>
        <rect x="23" y="32" width="26" height="3.6" rx="1.8" fill="white"/>
        <rect x="23" y="38" width="26" height="3.6" rx="1.8" fill="white"/>
      </svg>
    </div>

    <div class="brand-name">SAMIKARAN<span class="brand-dot">.</span></div>
    <div class="brand-sub">Olympiad</div>

    <div class="wifi-icon">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 80a5 5 0 100-10 5 5 0 000 10z" fill="#94a3b8"/>
        <path class="wifi-slash" d="M38 62c3.2-3.5 7.5-5.5 12-5.5s8.8 2 12 5.5" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
        <path class="wifi-slash" d="M26 50c6.4-7 15-11 24-11s17.6 4 24 11" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
        <path class="wifi-slash" d="M14 38c9.6-10.5 22.5-16.5 36-16.5s26.4 6 36 16.5" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
        <line x1="18" y1="18" x2="82" y2="82" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>No Internet Connection</h1>
    <p class="subtitle">It looks like you're offline right now. Don't worry — your progress is safe.</p>

    <div class="tips">
      <div class="tips-title">Quick fixes</div>
      <div class="tip"><span class="tip-dot"></span> Check your Wi-Fi or mobile data</div>
      <div class="tip"><span class="tip-dot"></span> Turn Airplane mode off</div>
      <div class="tip"><span class="tip-dot"></span> Restart your router or modem</div>
      <div class="tip"><span class="tip-dot"></span> Move closer to your Wi-Fi router</div>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
      </svg>
      Try Again
    </button>

    <div class="status-bar">
      <span class="status-dot"></span>
      <span>Waiting for connection...</span>
    </div>
  </div>

  <script>
    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
